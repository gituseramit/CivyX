version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: civyx-postgres
    environment:
      POSTGRES_USER: gramvaani
      POSTGRES_PASSWORD: gramvaani123
      POSTGRES_DB: gramvaani
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gramvaani -d gramvaani"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: civyx-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civyx-backend
    environment:
      - DB_URL=postgres://gramvaani:gramvaani123@postgres:5432/gramvaani
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super_secret_dev_key_12345}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civyx-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
